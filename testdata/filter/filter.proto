syntax = "proto3";

option go_package = "github.com/chnxq/xkitmod/testdata/filter;filter";

package filter;

enum Operator {
  OPERATOR_UNSPECIFIED = 0;
  EQ = 1;
  CONTAINS = 2;
  IN = 3;
}

enum ExprType {
  EXPR_TYPE_UNSPECIFIED = 0;
  AND = 1;
  OR = 2;
}

message FilterCondition {
  string field = 1;
  Operator op = 2;
  string value = 3;
  repeated string values = 4;
}

message FilterExpr {
  ExprType type = 1;
  repeated FilterCondition conditions = 2;
}

message PagingRequest {
  uint32 page = 1;
  oneof filtering_type {
    string query = 10;
    FilterExpr filter_expr = 12;
  }
}
